<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER GORILLA: ULTIMATE OVERDRIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; user-select: none; touch-action: none; }
        
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px 40px;
            display: flex; justify-content: space-between; box-sizing: border-box;
            color: #0ff; font-size: clamp(20px, 3vw, 32px); font-weight: 700; z-index: 10;
            text-shadow: 0 0 10px #0ff; pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }

        #abilities {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; color: #fff; font-size: 24px; font-weight: 700; z-index: 10;
            display: none; text-shadow: 0 0 10px #ff0055;
        }
        .cooldown-bar { width: 200px; height: 10px; background: #333; margin-top: 5px; border: 2px solid #ff0055; box-shadow: 0 0 10px #ff0055;}
        #cooldown-fill { width: 100%; height: 100%; background: #ff0055; transition: width 0.1s linear; }

        .overlay {
            position: absolute; inset: 0; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(0,10,25,0.9) 0%, rgba(0,0,0,1) 100%);
        }

        .container {
            text-align: center; border-left: 6px solid #0ff; border-right: 6px solid #ff0055; padding: 50px 60px;
            background: rgba(5,5,10,0.9); backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
        }

        h1 { font-size: clamp(40px, 8vw, 80px); margin: 0; color: #fff; letter-spacing: 6px; text-transform: uppercase; line-height: 1; }
        h1 span { color: #ff0055; text-shadow: 0 0 20px rgba(255,0,85,0.8); }
        .subtitle { color: #0ff; letter-spacing: 3px; margin: 15px 0 30px; font-size: 18px; }

        .btn {
            background: transparent; color: #fff; border: 3px solid #0ff; padding: 15px 50px;
            font-family: 'Rajdhani'; font-weight: 700; font-size: 26px; cursor: pointer;
            box-shadow: inset 0 0 15px rgba(0,255,255,0.3), 0 0 15px rgba(0,255,255,0.3);
            transition: all 0.2s ease-in-out; text-transform: uppercase;
        }
        .btn:hover { background: #0ff; color: #000; box-shadow: 0 0 40px #0ff; transform: scale(1.1); }

        .hidden { display: none !important; }
        .flash { animation: flashScreen 0.2s ease-out; }
        @keyframes flashScreen { 0% { background: rgba(255,0,85,0.5); } 100% { background: transparent; } }

        #mobile-dash-btn {
            position: absolute; bottom: 20px; right: 20px; width: 80px; height: 80px;
            border-radius: 50%; background: rgba(0,255,255,0.2); border: 2px solid #0ff;
            z-index: 50; display: none; align-items: center; justify-content: center;
            color: #0ff; font-weight: bold; font-size: 14px; box-shadow: 0 0 15px #0ff;
        }
    </style>
</head>
<body>

    <div id="flash-fx" style="position:absolute; inset:0; z-index:5; pointer-events:none;"></div>
    <div id="mobile-dash-btn">DASH</div>

    <div id="hud">
        <div>SCORE: <span id="score-val" style="color: #fff;">0</span></div>
        <div style="color: #ff0055">BEST: <span id="best-val" style="color: #fff;">0</span></div>
    </div>

    <div id="abilities">
        OVERDRIVE [ESPACIO]
        <div class="cooldown-bar"><div id="cooldown-fill"></div></div>
    </div>

    <div id="start-screen" class="overlay">
        <div class="container">
            <h1>CYBER<span>GORILLA</span></h1>
            <p class="subtitle">W: SALTA | S: AGACHA | A-D: MOVER<br><span style="color:#ff0055; font-weight:bold; font-size: 22px;">ESPACIO: OVERDRIVE (DASH)</span></p>
            <button class="btn" onclick="iniciarJuego()">CONECTAR</button>
        </div>
    </div>

    <div id="death-screen" class="overlay hidden">
        <div class="container" style="border-color: #ff0055;">
            <h1 style="color: #ff0055;">CRASH DETECTED</h1>
            <p id="final-score" class="subtitle" style="font-size: 30px; color: #fff;"></p>
            <button class="btn" style="border-color: #ff0055; box-shadow: 0 0 20px #ff0055;" onclick="location.reload()">REBOOT</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js';

        let scene, camera, renderer, clock, audioCtx;
        let gorilla, armL, armR, bodyGroup, board, faceLight;
        let grid, buildings = [], rings = [], obstacles = [];
        
        let gameActive = false, score = 0, speed = 1.4, lane = 0; 
        let isJumping = false, isDucking = false, jumpV = 0, jumpY = 0;
        let nextSpawnTime = 1.0, distanceTraveled = 0;

        let lastThousand = 0;
        let isFlipping = false;
        let flipProgress = 0;

        let isDashing = false;
        let dashTimer = 0;
        let dashCooldown = 0;
        const DASH_DURATION = 1.5;
        const DASH_COOLDOWN_MAX = 6.0;

        const LANES = [-8, 0, 8]; 
        const BEST_SCORE_KEY = 'cg_ultimate_score_v4';

        window.iniciarJuego = function() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('hud').style.opacity = '1';
            document.getElementById('abilities').style.display = 'block';
            document.getElementById('best-val').innerText = localStorage.getItem(BEST_SCORE_KEY) || 0;
            
            if(/Android|iPhone|iPad/i.test(navigator.userAgent)) {
                document.getElementById('mobile-dash-btn').style.display = 'flex';
            }

            initMotor();
            crearEntorno();
            crearGorila();
            configurarInputs();
            
            gameActive = true; // Marcar como activo antes de iniciar la música
            iniciarMusica();
            
            clock = new THREE.Clock();
            animate();
        };

        function initMotor() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020205, 0.006);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 800);
            camera.position.set(0, 8, 20); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            const hemiLight = new THREE.HemisphereLight(0x00ffff, 0xff0055, 1.5);
            scene.add(hemiLight);
        }

        function crearGorila() {
            gorilla = new THREE.Group();
            bodyGroup = new THREE.Group();
            const matDark = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.9, roughness: 0.1 });
            const matSkin = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            
            const torso = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1.8, 1.6), matDark);
            torso.position.y = 0.5;
            
            const head = new THREE.Group();
            head.position.set(0, 1.7, 0.6);
            const cranium = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.1, 1.2), matDark);
            const jaw = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.5, 0.8), matSkin);
            jaw.position.set(0, -0.4, 0.3);
            
            const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
            eyeL.position.set(-0.3, 0.2, 0.65);
            const eyeR = eyeL.clone(); eyeR.position.x = 0.3;
            
            const visor = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.3, 0.1), new THREE.MeshBasicMaterial({color: 0x00ffff, transparent: true, opacity: 0.7}));
            visor.position.set(0, 0.2, 0.65);

            faceLight = new THREE.PointLight(0xff0000, 0, 5);
            faceLight.position.set(0, 0, 1.5);

            head.add(cranium, jaw, eyeL, eyeR, visor, faceLight);
            bodyGroup.add(torso, head);

            armL = new THREE.Mesh(new THREE.BoxGeometry(0.9, 3.2, 0.9), matDark);
            armL.position.set(-1.8, 0.2, 0.4);
            armR = armL.clone(); armR.position.x = 1.8;
            bodyGroup.add(armL, armR);

            board = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.3, 7), new THREE.MeshBasicMaterial({color: 0xff0055}));
            board.position.y = -0.8;
            const glow = new THREE.PointLight(0xff0055, 10, 15);
            board.add(glow);

            gorilla.add(bodyGroup, board);
            scene.add(gorilla);
        }

        function crearEntorno() {
            grid = new THREE.GridHelper(1000, 100, 0x00ffff, 0x050510);
            grid.position.y = -1;
            scene.add(grid);

            for(let i = 0; i < 80; i++) {
                const height = 30 + Math.random() * 100;
                const b = new THREE.Mesh(
                    new THREE.BoxGeometry(15, height, 15),
                    new THREE.MeshStandardMaterial({ color: 0x020202, emissive: 0x001122 })
                );
                const side = Math.random() > 0.5 ? 1 : -1;
                b.position.set(side * (40 + Math.random() * 30), height/2 - 1, -i * 20);
                const edge = new THREE.LineSegments(
                    new THREE.EdgesGeometry(b.geometry),
                    new THREE.LineBasicMaterial({ color: Math.random()>0.5?0x00ffff:0xff0055, transparent: true, opacity: 0.3 })
                );
                b.add(edge);
                scene.add(b);
                buildings.push(b);
            }

            for(let i=0; i<10; i++) {
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(35, 0.5, 8, 32),
                    new THREE.MeshBasicMaterial({color: 0xff0055, transparent: true, opacity: 0.2})
                );
                ring.position.set(0, 10, -i * 100);
                scene.add(ring);
                rings.push(ring);
            }
        }

        function generarObstaculos() {
            const numObstacles = speed > 2.5 ? 2 : (Math.random() > 0.6 ? 2 : 1); 
            const carriles = [0, 1, 2].sort(() => 0.5 - Math.random()).slice(0, numObstacles);

            carriles.forEach(c => {
                const r = Math.random();
                let obj = new THREE.Group();
                let tipo = "";

                if(r < 0.25) {
                    const mesh = new THREE.Mesh(new THREE.SphereGeometry(3, 16, 16), new THREE.MeshBasicMaterial({color: 0xffffff, wireframe: true}));
                    const core = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshStandardMaterial({color: 0xff0000, emissive: 0xff0000}));
                    mesh.add(core); obj.add(mesh); obj.position.y = 2; tipo = "drone";
                    obj.userData = { tipo: tipo, dir: Math.random() > 0.5 ? 1 : -1, speed: 15 + Math.random()*10 };
                }
                else if(r < 0.5) {
                    const m = new THREE.Mesh(new THREE.BoxGeometry(6, 16, 2), new THREE.MeshStandardMaterial({color: 0xff0055, emissive: 0xff0055}));
                    m.position.y = 7; obj.add(m); tipo = "muro";
                } 
                else if(r < 0.75) {
                    const v = new THREE.Mesh(new THREE.BoxGeometry(7, 2, 2), new THREE.MeshStandardMaterial({color: 0x00ffff, emissive: 0x00ffff}));
                    v.position.y = 0; obj.add(v); tipo = "salto";
                } 
                else {
                    const t = new THREE.Mesh(new THREE.BoxGeometry(8, 8, 4), new THREE.MeshStandardMaterial({color: 0x222200}));
                    const l = new THREE.Mesh(new THREE.BoxGeometry(8, 0.5, 2), new THREE.MeshBasicMaterial({color: 0xffff00}));
                    t.position.y = 8; l.position.y = 3.5; obj.add(t, l); tipo = "agacha";
                }
                obj.position.set(LANES[c], 0, -250);
                if(!obj.userData.tipo) obj.userData = { tipo: tipo };
                scene.add(obj); obstacles.push(obj);
            });
        }

        function activarDash() {
            if(dashCooldown <= 0 && !isDashing) {
                isDashing = true; dashTimer = DASH_DURATION; dashCooldown = DASH_COOLDOWN_MAX;
                board.children[0].intensity = 50;
                board.children[0].color.setHex(0xffffff);
                playSound(800, 'sawtooth', 0.1, 0.4);
            }
        }

        function playSound(freq, type, vol, dur) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            distanceTraveled += speed * dt * 60;
            score = Math.floor(distanceTraveled);
            document.getElementById('score-val').innerText = score;
            speed += 0.0004;

            const currentThousand = Math.floor(score / 1000);
            if(currentThousand > lastThousand && score > 0) {
                lastThousand = currentThousand;
                isFlipping = true; flipProgress = 0;
                playSound(440, 'sine', 0.2, 0.5); 
            }

            if(dashCooldown > 0) {
                dashCooldown -= dt;
                document.getElementById('cooldown-fill').style.width = Math.max(0, (1 - dashCooldown/DASH_COOLDOWN_MAX) * 100) + '%';
            }

            if(isDashing) {
                dashTimer -= dt;
                camera.fov = THREE.MathUtils.lerp(camera.fov, 110, 0.1);
                if(dashTimer <= 0) {
                    isDashing = false;
                    board.children[0].intensity = 10; board.children[0].color.setHex(0xff0055);
                }
            } else { camera.fov = THREE.MathUtils.lerp(camera.fov, 70, 0.1); }
            camera.updateProjectionMatrix();

            nextSpawnTime -= dt;
            if(nextSpawnTime <= 0) {
                generarObstaculos();
                nextSpawnTime = Math.max(0.6, 1.8 - (speed - 1.4)*0.5); 
            }

            gorilla.position.x = THREE.MathUtils.lerp(gorilla.position.x, LANES[lane + 1], 0.15);
            if(isJumping) { jumpY += jumpV; jumpV -= 0.04; if(jumpY <= 0) { jumpY = 0; isJumping = false; } }
            gorilla.position.y = jumpY;
            bodyGroup.scale.y = THREE.MathUtils.lerp(bodyGroup.scale.y, isDucking ? 0.35 : 1, 0.2);

            if(isFlipping) {
                flipProgress += dt * 1.5;
                bodyGroup.rotation.x = flipProgress * Math.PI * 2;
                faceLight.intensity = (flipProgress > 0.3 && flipProgress < 0.7) ? 25 : 0;
                if(flipProgress >= 1) { isFlipping = false; bodyGroup.rotation.x = 0; faceLight.intensity = 0; }
            } else if(!isJumping && !isDucking) {
                const run = time * (10 + speed);
                armL.position.z = Math.sin(run) * 1.0 + 0.5;
                armR.position.z = -Math.sin(run) * 1.0 + 0.5;
                bodyGroup.position.y = Math.abs(Math.sin(run)) * 0.2;
            }

            grid.position.z = (grid.position.z + speed) % 20;
            buildings.forEach(b => { b.position.z += speed; if(b.position.z > 40) b.position.z = -1500; });
            rings.forEach(r => { r.position.z += speed * 1.5; r.rotation.z += dt; if(r.position.z > 40) r.position.z = -1000; });

            for(let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += speed;
                if(obs.userData.tipo === "drone") {
                    obs.position.x += obs.userData.dir * obs.userData.speed * dt;
                    if(obs.position.x > 12 || obs.position.x < -12) obs.userData.dir *= -1;
                }
                const hitX = Math.abs(obs.position.x - gorilla.position.x) < 3.0;
                const hitZ = Math.abs(obs.position.z - gorilla.position.z) < 2.5;

                if(hitX && hitZ) {
                    if(isDashing) {
                        scene.remove(obs); obstacles.splice(i, 1);
                        const fx = document.getElementById('flash-fx');
                        fx.classList.remove('flash'); void fx.offsetWidth; fx.classList.add('flash');
                        continue;
                    }
                    const tipo = obs.userData.tipo;
                    if(tipo === "muro" || tipo === "drone") gameOver();
                    if(tipo === "salto" && jumpY < 2.2) gameOver();
                    if(tipo === "agacha" && (!isDucking || jumpY > 1.0)) gameOver();
                }
                if(obs.position.z > 30) { scene.remove(obs); obstacles.splice(i, 1); }
            }
            renderer.render(scene, camera);
        }

        function gameOver() {
            gameActive = false;
            const currentBest = parseInt(localStorage.getItem(BEST_SCORE_KEY)) || 0;
            if(score > currentBest) localStorage.setItem(BEST_SCORE_KEY, score);
            document.getElementById('death-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `SCORE: ${score}`;
        }

        function configurarInputs() {
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if(k === 'a' || k === 'arrowleft') lane = Math.max(-1, lane - 1);
                if(k === 'd' || k === 'arrowright') lane = Math.min(1, lane + 1);
                if((k === 'w' || k === 'arrowup') && !isJumping && !isDucking) { isJumping = true; jumpV = 0.75; }
                if((k === 's' || k === 'arrowdown') && !isJumping) isDucking = true;
                if(k === ' ') activarDash();
            });
            window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() === 's' || e.key === 'arrowdown') isDucking = false; });

            let startX, startY;
            window.ontouchstart = (e) => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; };
            window.ontouchend = (e) => {
                const dx = e.changedTouches[0].clientX - startX;
                const dy = e.changedTouches[0].clientY - startY;
                if(Math.abs(dx) > Math.abs(dy)) {
                    if(dx > 40) lane = Math.min(1, lane + 1);
                    else if(dx < -40) lane = Math.max(-1, lane - 1);
                } else {
                    if(dy < -40 && !isJumping) { isJumping = true; jumpV = 0.75; }
                    else if(dy > 40) { isDucking = true; setTimeout(()=>isDucking=false, 500); }
                }
            };
            document.getElementById('mobile-dash-btn').onclick = activarDash;
        }

        function iniciarMusica() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume(); // LINEA AÑADIDA PARA ACTIVAR AUDIO
            
            let nextNoteTime = audioCtx.currentTime;
            let step = 0;
            const arpeggio = [130.81, 155.56, 196.00, 261.63, 311.13, 261.63, 196.00, 155.56]; 
            const bass = [65.41, 65.41, 77.78, 98.00];

            function scheduler() {
                if(!gameActive) return;
                const stepTime = (60 / (125 * Math.min(2.0, speed * 0.8))) / 2; 
                while (nextNoteTime < audioCtx.currentTime + 0.1) {
                    if (step % 4 === 0) {
                        const kOsc = audioCtx.createOscillator(); const kGain = audioCtx.createGain();
                        kOsc.frequency.setValueAtTime(150, nextNoteTime); kOsc.frequency.exponentialRampToValueAtTime(0.01, nextNoteTime + 0.2);
                        kGain.gain.setValueAtTime(0.3, nextNoteTime); kGain.gain.exponentialRampToValueAtTime(0.01, nextNoteTime + 0.2);
                        kOsc.connect(kGain); kGain.connect(audioCtx.destination); kOsc.start(nextNoteTime); kOsc.stop(nextNoteTime + 0.2);
                        
                        const bOsc = audioCtx.createOscillator(); const bGain = audioCtx.createGain();
                        bOsc.type = 'square'; bOsc.frequency.setValueAtTime(bass[Math.floor(step/8)%4], nextNoteTime);
                        bGain.gain.setValueAtTime(0.08, nextNoteTime); bGain.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + 0.5);
                        bOsc.connect(bGain); bGain.connect(audioCtx.destination); bOsc.start(nextNoteTime); bOsc.stop(nextNoteTime + 0.5);
                    }
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = isDashing ? 'square' : 'sawtooth';
                    osc.frequency.setValueAtTime(arpeggio[step % arpeggio.length] * (isDashing ? 2 : 1), nextNoteTime);
                    gain.gain.setValueAtTime(isDashing ? 0.1 : 0.06, nextNoteTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, nextNoteTime + stepTime);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(nextNoteTime); osc.stop(nextNoteTime + stepTime);
                    nextNoteTime += stepTime; step++;
                }
                setTimeout(scheduler, 25);
            }
            scheduler();
        }
    </script>
</body>
</html>
